name: km_tracker
description: "AURA km tracker - Professional mileage tracker with background GPS tracking"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  geolocator: ^13.0.0
  flutter_foreground_task: ^8.13.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  http: ^1.2.2
  shared_preferences: ^2.3.3
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: 6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
